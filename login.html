<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login - Casart</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="Logo/icon.png">

    <style>
        * {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Poppins", Arial, sans-serif;
  background: #f0f2f5;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.merge {
  display: flex;
  width: 80%;
  max-width: 900px;
  height: 600px;
  background: #ffffff;
  border-radius: 18px;
  overflow: hidden;
  box-shadow:
    0 25px 60px rgba(0, 0, 0, 0.18),
    inset 0 0 0 1px rgba(255, 255, 255, 0.5);
}

.v-side {
  flex: 1;
  position: relative;
}

.v-side video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  cursor: pointer;
}

.v-side::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom right,
    rgba(0, 0, 0, 0.15),
    rgba(0, 0, 0, 0.35)
  );
  pointer-events: none;

}

.f-side {
  flex: 1;
  padding: 40px 55px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.brand {
  display: flex;
  justify-content: center;
  margin-bottom: 18px;
}

.brand img {
  width: 46px;
  height: 46px;
  border-radius: 12px;
  box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
}

.f-side h2 {
  text-align: center;
  font-size: 26px;
  margin-bottom: 28px;
  color: #2c3e50;
  letter-spacing: 0.5px;
}

.f-side label {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 6px;
  display: block;
  color: #555;
}

.f-side input {
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 22px;
  border-radius: 12px;
  border: 1px solid #d8dee8;
  font-size: 15px;
  background: #f7f9fc;
  transition: 0.2s ease;
}

.f-side input:focus {
  outline: none;
  background: #ffffff;
  border-color: #1abc9c;
  box-shadow: 0 0 0 4px rgba(26, 188, 156, 0.15);
}

.f-side button {
  width: 100%;
  padding: 15px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg, #1abc9c, #16a085);
  color: white;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.f-side button:hover {
  transform: translateY(-2px);
}

.f-side p {
  margin-top: 20px;
  text-align: center;
  font-size: 14px;
  color: #666;
}

.f-side a {
  color: #1abc9c;
  font-weight: 600;
  text-decoration: none;
}

.f-side a:hover {
  text-decoration: underline;
}

@media (max-width: 900px) {
  body {
    height: auto;
    padding: 40px 0;
  }

  .merge {
    flex-direction: column;
    width: 92%;
    height: auto;
  }

  .v-side {
    height: 240px;
  }

  .f-side {
    padding: 45px 30px;
    align-items: center;
  }

  .f-side form {
    width: 100%;
    max-width: 420px;
  }
}

@media (max-width: 600px) {
  body {
    padding: 20px;
  }

  .merge {
    width: 100%;
    box-shadow: none;
    border-radius: 16px;
  }

  .v-side {
    display: none;
  }

  .f-side {
    padding: 35px 20px;
    align-items: center;
  }

  .f-side form {
    width: 100%;
    max-width: 360px;
  }

  .f-side h2 {
    font-size: 24px;
  }
}

    </style>
</head>
<body>
    <div class="merge">
        <div class="v-side">
            <video id="video" autoplay loop muted>
                <source src="Logo/Logvideo.mp4" type="video/mp4">
            </video>
        </div>

        <div class="f-side">
            <div class="brand">
  <img src="Logo/logoo.png" alt="Casart Logo" />
</div>

            <h2>Login to Casart</h2>

            <form action="prologin.php" method="POST">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>

            <button type="submit" onclick="window.location.href='shop.html'">Login</button>
                <p>Don't have an account? <a href="register.html">Register here</a></p>
            </form>
        </div>
    </div>

    <script>
        const vid = document.getElementById("video");
        vid.addEventListener("click", () => {
            vid.muted = !vid.muted;
            vid.play();
        });
    </script>
</body>
</html>

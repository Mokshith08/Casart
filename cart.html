<!doctype html>
<html lang="en">
  <head>
    <title>My Cart - Casart</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f1f3f6;
      }

      .cart-header {
        background: white;
        display: flex;
        align-items: center;
        padding: 15px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
      }

      .back {
        font-size: 18px;
        cursor: pointer;
        margin-right: 15px;
      }

      .cart-header h3 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
      }

      .empty-cart {
        text-align: center;
        padding: 60px 20px;
      }

      .empty-cart img {
        width: 220px;      
  max-width: 90%;    
  opacity: 0.9;
  margin-bottom: 20px;
      }

      .empty-cart h4 {
        margin-bottom: 15px;
      }

      .login-btn {
        background: #2874f0;
        border: none;
        color: white;
        padding: 10px 35px;
        border-radius: 4px;
        cursor: pointer;
      }

      .continue {
        margin-top: 15px;
        color: #2874f0;
        font-size: 13px;
        cursor: pointer;
      }

      .cart-container {
        padding: 15px;
      }

      .cart-item {
        background: white;
        padding: 12px;
        margin-bottom: 12px;
        border-radius: 6px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
      }

      .cart-item h4 {
        margin: 0 0 5px;
        font-size: 14px;
      }

      .cart-item p {
        margin: 0;
        font-size: 13px;
        color: #555;
      }

      .remove-btn {
        margin-top: 8px;
        font-size: 12px;
        color: red;
        cursor: pointer;
      }

      /* TOTAL */
      .cart-total {
        background: white;
        padding: 15px;
        font-weight: bold;
        display: flex;
        justify-content: space-between;
        position: sticky;
        bottom: 0;
        border-top: 1px solid #eee;
      }

      .checkout-btn {
        background: #fb641b;
        border: none;
        color: white;
        padding: 10px 20px;
        cursor: pointer;
        border-radius: 4px;
      }
    </style>
  </head>

  <body>
    <div class="cart-header">
      <span class="back" onclick="history.back()">←</span>
      <h3>My Cart</h3>
    </div>

   <div id="emptyCart" class="empty-cart" style="display: none">
  <img src="Logo/pronot.jpg" />
  <h4>Your cart is empty</h4>
  <p class="continue" onclick="window.location.href = 'shop.html'">
    Continue Shopping
  </p>
</div>

    <div id="cartContent" style="display: none">
      <div id="cartItems" class="cart-container"></div>

      <div class="cart-total">
        <span>Total: ₹<span id="totalPrice">0</span></span>
        <button class="checkout-btn">Checkout</button>
      </div>
    </div>

<script>
  const supabaseUrl = "https://ohdbbeqffwwzbfruutim.supabase.co";
  const supabaseKey = "sb_publishable_e_zywcmynGSVaRpdR3VG1A_55Hr3GKU"; 
  const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

  const emptyCart = document.getElementById("emptyCart");
  const cartContent = document.getElementById("cartContent");
  const cartItemsDiv = document.getElementById("cartItems");
  const totalPriceDiv = document.getElementById("totalPrice");

  async function loadCart() {
  emptyCart.style.display = "none";
  cartContent.style.display = "none";

  const { data: { user }, error } =
    await supabaseClient.auth.getUser();

  if (error || !user) {
    // If not logged in, show empty cart
    emptyCart.style.display = "block";
    return;
  }

  const { data, error: cartError } = await supabaseClient
    .from("cart")
    .select("*")
    .eq("user_id", user.id);  // 🔐 user-specific

  if (cartError || !data || data.length === 0) {
    emptyCart.style.display = "block";
    return;
  }

  cartContent.style.display = "block";
  cartItemsDiv.innerHTML = "";

  let total = 0;

  data.forEach((item) => {
    const quantity = item.quantity || 1;
    const itemTotal = item.price * quantity;
    total += itemTotal;

    const div = document.createElement("div");
    div.classList.add("cart-item");
    div.innerHTML = `
      <h4>${item.product_name}</h4>
      <p>₹${item.price} × ${quantity}</p>
      <div class="remove-btn" onclick="removeItem('${item.id}')">
        Remove
      </div>
    `;

    cartItemsDiv.appendChild(div);
  });

  totalPriceDiv.textContent = total;
}

  async function removeItem(id) {
  const { data: { user } } = await supabaseClient.auth.getUser();

  if (!user) return;

  await supabaseClient
    .from("cart")
    .delete()
    .eq("id", id)
    .eq("user_id", user.id); // extra safety

  loadCart();
}

  loadCart();
</script>
  </body>
</html>

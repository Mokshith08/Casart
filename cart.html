<!doctype html>
<html lang="en">
<head>
<title>My Cart - Casart</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="Logo/icon.png">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:"Poppins",Arial;
background:#f1f3f6;
}

.cart-header{
background:white;
display:flex;
align-items:center;
padding:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.back{
font-size:20px;
cursor:pointer;
margin-right:15px;
}

.cart-header h3{
margin:0;
font-size:18px;
font-weight:600;
}


.empty-cart{
text-align:center;
padding:80px 20px;
}

.empty-cart img{
width:220px;
opacity:0.9;
margin-bottom:20px;
}

.continue{
color:#2874f0;
cursor:pointer;
font-size:14px;
}


.cart-container{
padding:15px;
padding-bottom:100px;
}


.cart-card{
display:flex;
gap:15px;
background:white;
padding:15px;
border-radius:14px;
margin-bottom:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
transition:.2s;
}

.cart-card:hover{
transform:translateY(-2px);
}

.cart-img{
width:85px;
height:85px;
object-fit:cover;
border-radius:10px;
}

.cart-details{
flex:1;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.cart-details h3{
margin:0;
font-size:16px;
font-weight:600;
}

.price{
font-size:14px;
color:#777;
margin:4px 0;
}

.qty-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:6px;
}

.qty-control{
display:flex;
align-items:center;
border:1px solid #ddd;
border-radius:8px;
overflow:hidden;
}

.qty-control button{
width:30px;
height:30px;
border:none;
background:#f5f5f5;
font-size:18px;
cursor:pointer;
}

.qty-control span{
padding:0 12px;
font-weight:600;
}

.subtotal{
font-weight:600;
color:#1abc9c;
}

.remove-btn{
margin-top:8px;
background:none;
border:none;
color:#e74c3c;
font-size:13px;
cursor:pointer;
text-align:left;
}

.cart-total{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
padding:16px 20px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 -6px 20px rgba(0,0,0,0.08);
}

.cart-total span{
font-size:18px;
font-weight:700;
}

.checkout-btn{
background:linear-gradient(135deg,#ff7a18,#ff5e00);
border:none;
color:white;
padding:14px 28px;
border-radius:10px;
font-weight:600;
font-size:15px;
cursor:pointer;
}


@media(max-width:600px){

.cart-img{
width:75px;
height:75px;
}

.checkout-btn{
padding:12px 20px;
font-size:14px;
}

}

</style>
</head>


<body>

<div class="cart-header">
<span class="back" onclick="history.back()">←</span>
<h3>My Cart</h3>
</div>


<div id="emptyCart" class="empty-cart" style="display:none">

<img src="Logo/pronot.jpg">

<h4>Your cart is empty</h4>

<p class="continue" onclick="window.location.href='shop.html'">
Continue Shopping
</p>

</div>


<div id="cartContent" style="display:none">

<div id="cartItems" class="cart-container"></div>

<div class="cart-total">
<span>Total: ₹<span id="totalPrice">0</span></span>
<button class="checkout-btn">Checkout</button>
</div>

</div>


<script>

const supabaseUrl="https://ohdbbeqffwwzbfruutim.supabase.co"
const supabaseKey="sb_publishable_e_zywcmynGSVaRpdR3VG1A_55Hr3GKU"

const supabaseClient=window.supabase.createClient(supabaseUrl,supabaseKey)

const emptyCart=document.getElementById("emptyCart")
const cartContent=document.getElementById("cartContent")
const cartItemsDiv=document.getElementById("cartItems")
const totalPriceDiv=document.getElementById("totalPrice")


async function loadCart(){

emptyCart.style.display="none"
cartContent.style.display="none"

const {data:{user}}=await supabaseClient.auth.getUser()

if(!user){
emptyCart.style.display="block"
return
}

const {data,error}=await supabaseClient
.from("cart")
.select("*")
.eq("user_id",user.id)

if(error||!data||data.length===0){
emptyCart.style.display="block"
return
}

cartContent.style.display="block"
cartItemsDiv.innerHTML=""

let total=0

data.forEach(item=>{

const quantity=item.quantity||1
const itemTotal=item.price*quantity
total+=itemTotal

const div=document.createElement("div")
div.classList.add("cart-card")

div.innerHTML=`

<img src="${item.image}" class="cart-img">

<div class="cart-details">

<h3>${item.product_name}</h3>

<p class="price">₹${item.price}</p>

<div class="qty-row">

<div class="qty-control">
<button onclick="changeQty('${item.id}',-1)">−</button>
<span>${quantity}</span>
<button onclick="changeQty('${item.id}',1)">+</button>
</div>

<span class="subtotal">₹${itemTotal}</span>

</div>

<button class="remove-btn"
onclick="removeItem('${item.id}')">
Remove
</button>

</div>
`

cartItemsDiv.appendChild(div)

})

totalPriceDiv.textContent=total

}


async function changeQty(id,change){

const {data}=await supabaseClient
.from("cart")
.select("*")
.eq("id",id)
.single()

let newQty=data.quantity+change

if(newQty<1){
removeItem(id)
return
}

await supabaseClient
.from("cart")
.update({quantity:newQty})
.eq("id",id)

loadCart()

}


async function removeItem(id){

const {data:{user}}=await supabaseClient.auth.getUser()

if(!user)return

await supabaseClient
.from("cart")
.delete()
.eq("id",id)
.eq("user_id",user.id)

loadCart()

}


loadCart()

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <title>Register - Casart</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="Logo/icon.png" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .register-box {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 35px 30px;
    }

    .brand {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .brand img {
      width: 42px;
      height: 42px;
      border-radius: 10px;
    }

    h2 {
      text-align: center;
      font-size: 22px;
      margin-bottom: 25px;
      color: #222;
    }

    label {
      font-size: 14px;
      margin-bottom: 6px;
      display: block;
      color: #333;
    }

    input {
      width: 100%;
      padding: 11px;
      margin-bottom: 18px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #0077cc;
      box-shadow: 0 0 0 4px rgba(26, 188, 156, 0.15);
    }

    button {
      width: 100%;
      padding: 12px;
      background: #0077cc;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #005fa3;
    }

    .login-link {
      margin-top: 15px;
      text-align: center;
      font-size: 13px;
    }

    .login-link a {
      color: #0077cc;
      text-decoration: none;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

@media (max-width: 768px) {
  body {
    padding: 20px;
  }

  .register-box {
    max-width: 380px;
    padding: 30px 25px;
  }

  h2 {
    font-size: 20px;
  }

  input {
    font-size: 14px;
    padding: 10px;
  }

  button {
    font-size: 14px;
  }
}

@media (max-width: 480px) {
  body {
    padding: 15px;
    align-items: flex-start;
  }

  .register-box {
    margin-top: 30px;
    width: 100%;
    padding: 28px 18px;
    border-radius: 10px;
  }

  .brand img {
    width: 38px;
    height: 38px;
  }

  h2 {
    font-size: 18px;
    margin-bottom: 20px;
  }

  label {
    font-size: 13px;
  }

  input {
    font-size: 13px;
  }

  .login-link {
    font-size: 12px;
  }
}

  </style>
</head>

<body>

  <div class="register-box">
    <div class="brand">
      <img src="Logo/logoo.png" alt="Casart Logo">
    </div>

    <h2>Create your Casart account</h2>

    <form action="proregister.php" method="POST">
      <label>Full Name</label>
      <input type="text" name="name" required>

      <label>Email</label>
      <input type="email" name="email" required>

      <label>Password</label>
      <input type="password" name="password" required>

      <label>Confirm Password</label>
      <input type="password" name="confirm_password" required>

      <button type="submit">Register</button>

      <div class="login-link">
        Already have an account?
        <a href="login.html">Login</a>
      </div>
    </form>
  </div>

</body>
</html>
